spring.application.name=Example

#spring.datasource.url=jdbc:sqlserver://localhost:1433;trustServerCertificate=true;encrypt=true;integratedSecurity=false;databaseName=hardware_web_shop;
#spring.datasource.username=sa
#spring.datasource.password=SQL

spring.jpa.defer-datasource-initialization=true
server.port=8084
spring.jpa.show-sql=true

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 konzola (dostupna na http://localhost:8084/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT postavke
# jwt.secret je Base64-kodiran tajni kljuc (mora biti minimalno 32 bajta = 256 bita)
# Ovaj kljuc dekodira se u "secretsecretsecretsecretsecretsecretsecret" (36 bajta)
jwt.secret=c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0
# jwt.expiration je trajanje access tokena u milisekundama (300000 ms = 5 minuta)
jwt.expiration=300000

